services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - HF_HOME=/models/huggingface
      - TRANSFORMERS_CACHE=/models/huggingface/transformers
      - HF_HUB_DISABLE_SYMLINKS_WARNING=1
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=http://localhost:8000
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
